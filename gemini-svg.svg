<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0d1117" rx="10"/>

  <g fill="#e6edf3">
    <circle cx="120" cy="50" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="80" r="1">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="30" r="2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="60" r="1.5">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="120" r="1">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="110" r="1.5">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(700, 60)">
    <circle cx="0" cy="0" r="25" fill="#c9d1d9"/>
    <circle cx="-6" cy="-4" r="23" fill="#0d1117"/>
  </g>

  <text x="560" y="40" fill="#8b949e" font-family="monospace" font-size="18" font-weight="bold" letter-spacing="2">HI 00258 00300</text>

  <g>
    <g transform="translate(300, 50)" fill="#21262d">
      <rect x="0" y="15" width="70" height="18" rx="9"/>
      <rect x="20" y="0" width="35" height="18" rx="9"/>
    </g>
    <g transform="translate(650, 90)" fill="#21262d">
      <rect x="0" y="12" width="55" height="14" rx="7"/>
      <rect x="15" y="0" width="28" height="14" rx="7"/>
    </g>
    <g transform="translate(100, 70)" fill="#21262d">
      <rect x="0" y="10" width="45" height="12" rx="6"/>
      <rect x="10" y="0" width="25" height="12" rx="6"/>
    </g>
    <animateTransform attributeName="transform" type="translate" from="150,0" to="-900,0" dur="20s" repeatCount="indefinite"/>
  </g>

  <g>
    <g>
      <path d="M 0,-18 C -14,-18 -14,6 0,18 C 14,6 14,-18 0,-18 Z" fill="#d2a8ff"/>
      <polygon points="-3,18 3,18 0,22" fill="#d2a8ff"/>
      <path d="M 0,22 Q -6,35 0,48 Q 6,60 0,72" fill="none" stroke="#8b949e" stroke-width="1.5"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="4s" repeatCount="indefinite"/>
    </g>
    <animateTransform attributeName="transform" type="translate" from="850, 100" to="-100, 100" dur="12s" repeatCount="indefinite"/>
  </g>

  <g stroke="#484f58" stroke-width="2" stroke-linecap="round">
    <line x1="-100" y1="200" x2="900" y2="200" stroke="#30363d" stroke-width="3"/>
    
    <path d="M50,205 h10 M150,208 h5 M250,205 h20 M350,208 h5
             M450,205 h10 M550,208 h5 M650,205 h20 M750,208 h5
             M850,205 h10 M950,208 h5 M1050,205 h20 M1150,208 h5" />
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-400,0" dur="1.2s" repeatCount="indefinite"/>
  </g>

  <g>
    <g transform="translate(0, 200)">
      <rect x="-6" y="-45" width="12" height="45" rx="5" fill="#3fb950"/>
      <path d="M -6,-20 h -10 v -14 a 5,5 0 0,1 10,0 v 10 h 2 z" fill="#3fb950"/>
      <path d="M 6,-30 h 10 v -10 a 5,5 0 0,0 -10,0 v 6 h -2 z" fill="#3fb950"/>
    </g>
    <animateTransform attributeName="transform" type="translate" from="850,0" to="-100,0" dur="2.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(100, 135)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="0.4s" repeatCount="indefinite"/>
      
      <path d="M 20,40 Q 0,40 -5,25 Q 0,55 20,55 Z" fill="#7ee787"/>
      <rect x="15" y="30" width="25" height="25" rx="5" fill="#7ee787"/>
      <rect x="25" y="15" width="15" height="25" fill="#7ee787"/>
      <rect x="25" y="0" width="25" height="20" rx="5" fill="#7ee787"/>
      <rect x="40" y="0" width="20" height="12" rx="4" fill="#7ee787"/>
      <rect x="44" y="10" width="16" height="3" fill="#0d1117"/>
      <circle cx="36" cy="6" r="2.5" fill="#0d1117"/>
      <path d="M 36,35 L 45,35 L 45,42" fill="none" stroke="#2ea043" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      
      <g transform="translate(0, -2)">
        <polygon points="37.5,-16 30,0 45,0" fill="#a5d6ff"/>
        <circle cx="37.5" cy="-16" r="3.5" fill="#ff7b72"/>
      </g>
    </g>

    <g>
      <g>
        <animate attributeName="display" values="inline;none;inline" keyTimes="0;0.5;1" dur="0.4s" repeatCount="indefinite"/>
        <rect x="30" y="50" width="7" height="15" rx="3" fill="#7ee787"/> <rect x="18" y="50" width="7" height="8" rx="3" fill="#2ea043"/>  </g>
      <g display="none">
        <animate attributeName="display" values="none;inline;none" keyTimes="0;0.5;1" dur="0.4s" repeatCount="indefinite"/>
        <rect x="30" y="50" width="7" height="8" rx="3" fill="#7ee787"/>  <rect x="18" y="50" width="7" height="15" rx="3" fill="#2ea043"/> </g>
    </g>
  </g>
