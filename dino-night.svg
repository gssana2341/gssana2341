<svg width="900" height="190" viewBox="0 0 900 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="frame">
      <rect x="0" y="0" width="900" height="190" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- sky -->
    <rect x="0" y="0" width="900" height="190" fill="#0D1117"/>

    <!-- stars -->
    <g fill="#C9D1D9">
      <circle cx="60" cy="24" r="1.4"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="150" cy="42" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" begin="0.4s" repeatCount="indefinite"/></circle>
      <circle cx="260" cy="20" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="2.2s" begin="0.8s" repeatCount="indefinite"/></circle>
      <circle cx="340" cy="55" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="430" cy="30" r="1.3"><animate attributeName="opacity" values="1;0.25;1" dur="3.4s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="520" cy="48" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="610" cy="18" r="1.5"><animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="1.3s" repeatCount="indefinite"/></circle>
      <circle cx="670" cy="50" r="1.2"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.7s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="730" cy="26" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="3.2s" begin="0.9s" repeatCount="indefinite"/></circle>
    </g>

    <!-- moon -->
    <circle cx="812" cy="38" r="17" fill="#7AA2F7"/>
    <circle cx="804" cy="32" r="15" fill="#0D1117"/>

    <!-- HUD score -->
    <text x="820" y="118" text-anchor="end" font-family="Fira Code, Consolas, monospace" font-size="14" fill="#8B949E">HI 06424</text>

    <!-- clouds (parallax) -->
    <g fill="#20293b">
      <g transform="translate(950,60)">
        <animateTransform attributeName="transform" type="translate" from="950 60" to="-160 60" dur="22s" begin="0s" repeatCount="indefinite"/>
        <ellipse cx="0" cy="0" rx="22" ry="9"/>
        <ellipse cx="18" cy="-4" rx="16" ry="8"/>
        <ellipse cx="-20" cy="-2" rx="14" ry="7"/>
      </g>
      <g transform="translate(950,88)">
        <animateTransform attributeName="transform" type="translate" from="950 88" to="-160 88" dur="22s" begin="11s" repeatCount="indefinite"/>
        <ellipse cx="0" cy="0" rx="18" ry="7"/>
        <ellipse cx="15" cy="-3" rx="12" ry="6"/>
        <ellipse cx="-16" cy="-2" rx="11" ry="6"/>
      </g>
    </g>

    <!-- ground -->
    <line x1="0" y1="150" x2="900" y2="150" stroke="#30363d" stroke-width="2"/>
    <g stroke="#30363d" stroke-width="2" stroke-dasharray="18,14">
      <line x1="0" y1="158" x2="900" y2="158">
        <animate attributeName="stroke-dashoffset" from="0" to="-64" dur="0.9s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- cacti (3 staggered) -->
    <g fill="#2ea043">
      <g transform="translate(950,150)">
        <animateTransform attributeName="transform" type="translate" from="950 150" to="-40 150" dur="6s" begin="0s" repeatCount="indefinite"/>
        <rect x="-10" y="-22" width="6" height="22"/>
        <rect x="-3" y="-34" width="6" height="34"/>
        <rect x="4" y="-18" width="6" height="18"/>
      </g>
      <g transform="translate(950,150)">
        <animateTransform attributeName="transform" type="translate" from="950 150" to="-40 150" dur="6s" begin="2s" repeatCount="indefinite"/>
        <rect x="-4" y="-26" width="7" height="26"/>
        <rect x="5" y="-16" width="6" height="16"/>
      </g>
      <g transform="translate(950,150)">
        <animateTransform attributeName="transform" type="translate" from="950 150" to="-40 150" dur="6s" begin="4s" repeatCount="indefinite"/>
        <rect x="-9" y="-16" width="6" height="16"/>
        <rect x="-1" y="-30" width="7" height="30"/>
        <rect x="8" y="-20" width="6" height="20"/>
      </g>
    </g>

    <!-- dino -->
    <g fill="#58A6FF">
      <polygon points="90,124 76,116 90,132"/>
      <rect x="90" y="110" width="34" height="20"/>
      <rect x="118" y="90" width="18" height="22"/>
      <rect x="132" y="98" width="12" height="9"/>
      <rect x="137" y="100" width="3" height="3" fill="#0D1117"/>
      <rect x="121" y="119" width="9" height="4"/>

      <g id="legsA">
        <rect x="96" y="130" width="7" height="16"/>
        <rect x="112" y="130" width="7" height="16"/>
        <animate attributeName="opacity" values="1;0;1" dur="0.28s" repeatCount="indefinite"/>
      </g>
      <g id="legsB">
        <rect x="92" y="130" width="7" height="13"/>
        <rect x="117" y="130" width="7" height="18"/>
        <animate attributeName="opacity" values="0;1;0" dur="0.28s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>
</svg>
